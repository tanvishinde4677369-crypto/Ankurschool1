<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Courses - Ankur</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Outfit&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(to right, #fff7e6, #f3e8ff);
            text-align: center;
            margin: 0;
        }

        h1 {
            font-family: 'Fredoka';
            color: #5f27cd;
            margin: 30px 0;
            font-size: 40px;
        }

        .garden {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .flower {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .flower:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .flower-head {
            position: relative;
            width: 130px;
            height: 130px;
            background: #feca57;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka';
            font-weight: bold;
            color: #5f27cd;
            text-align: center;
            z-index: 2;
        }

        /* Petals */
        .flower-head::before,
        .flower-head::after {
            content: "";
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 10px dotted #ff9f43;
            z-index: -1;
        }

        .stem {
            width: 10px;
            height: 60px;
            background: #1dd1a1;
            border-radius: 0 0 10px 10px;
        }

        .desc {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #555;
            max-width: 150px;
        }

        .back {
            margin: 40px 0;
            display: inline-block;
            padding: 12px 25px;
            background: #5f27cd;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .back:hover {
            background: #341f97;
        }
    </style>
</head>
<body>

    <h1>🌼 Our Courses</h1>

    <div class="garden">

        <div class="flower">
            <div class="flower-head">PLAY GROUP</div>
            <div class="stem"></div>
            <p class="desc">Fun-based learning for toddlers with activities & play.</p>
        </div>

        <div class="flower">
            <div class="flower-head">NURSERY</div>
            <div class="stem"></div>
            <p class="desc">Basic learning with creativity and social skills.</p>
        </div>

        <div class="flower">
            <div class="flower-head">JR. KG.</div>
            <div class="stem"></div>
            <p class="desc">Focus on language, numbers, and communication.</p>
        </div>

        <div class="flower">
            <div class="flower-head">SR. KG.</div>
            <div class="stem"></div>
            <p class="desc">Preparing children for school with confidence.</p>
        </div>

    </div>

    <a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
