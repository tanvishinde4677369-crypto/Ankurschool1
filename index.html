<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankur - The Learning Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Outfit&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
}

/* ===== BACKGROUND SLIDER (FINAL FIX) ===== */
.bg-slider {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
}

/* Images */
.bg-slider img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    transform: scale(1.08);
}

.bg-slider img.active {
    opacity: 1;
}

/* Overlay for clean look */
.bg-slider::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.28);
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 60px;
    width: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ffd700;
}

.logo-text {
    font-family: 'Fredoka';
    font-size: 26px;
    color: #5f27cd;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.nav-btn {
    padding: 8px 20px;
    border-radius: 30px;
    background: #5f27cd;
    color: white;
    text-decoration: none;
    font-weight: 600;
}

.nav-btn:hover {
    background: #341f97;
}

.active {
    background: #341f97;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
    padding: 20px;
}

.hero-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    width: 90%;
    max-width: 320px;
    padding: 20px 15px;
    border-radius: 25px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.center-logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
    border: 5px solid #ffd700;
    box-shadow: 0 0 20px rgba(255,215,0,0.7);
}

h1 {
    font-family: 'Fredoka';
    color: #5f27cd;
    font-size: 34px;
    font-weight: 900;
    margin: 5px 0;
}

/* ===== FLOAT BUTTON ===== */
.enquire-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ff4757;
    color: white;
    padding: 12px 18px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
}

/* ===== MOBILE FIX ===== */
@media (max-width: 768px) {

    .navbar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .logo-text {
        font-size: 20px;
    }

    .hero {
        height: auto;
        padding: 40px 10px;
    }

    h1 {
        font-size: 28px;
    }

    .center-logo {
        width: 85px;
        height: 85px;
    }
}
</style>
</head>

<body>

<!-- BACKGROUND SLIDER -->
<div class="bg-slider">
    <img src="p1.jpeg" class="active">
    <img src="p2.jpeg">
    <img src="p3.jpeg">
</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png">
        <span class="logo-text">ANKUR</span>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-btn active">Home</a>
        <a href="about.html" class="nav-btn">About</a>
        <a href="vision.html" class="nav-btn">Vision</a>
        <a href="contact.html" class="nav-btn">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-card">

        <img src="logo.png" class="center-logo">

        <h1>ANKUR</h1>
        <p><b>THE LEARNING HUB</b></p>

        <p>
            <span style="color:#ff4081;">Joyful,</span> 
            <span style="color:#ff69b4;">Stress-free &</span> 
            <span style="color:#ff1493;">Meaningful Learning</span>
        </p>

    </div>
</div>

<!-- FLOAT BUTTON -->
<a href="tel:9082137372" class="enquire-btn">ENQUIRE NOW</a>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll('.bg-slider img');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 3000);
</script>

</body>
</html>
