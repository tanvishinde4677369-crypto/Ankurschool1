<!DOCTYPE html>
<html>
<head>
<title>Admissions</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Outfit&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Outfit', sans-serif;
    text-align: center;
    background: linear-gradient(to right, #fff7e6, #e8f0ff);
    margin: 0;
}

/* Heading */
h1 {
    color: #5f27cd;
    font-family: 'Fredoka';
    margin-top: 40px;
    font-size: 40px;
}

/* Container */
.container {
    margin-top: 40px;
}

/* Buttons Base */
.btn {
    display: block;
    margin: 20px auto;
    padding: 15px;
    width: 260px;
    border-radius: 40px;
    text-decoration: none;
    font-weight: 600;
    color: white;
    transition: 0.3s;
}

/* Different Soft Colors */
.why { background: #ff9f43; }       /* orange */
.skills { background: #00b894; }    /* green */
.courses { background: #6c5ce7; }   /* purple */
.promise { background: #e84393; }   /* pink */

/* Hover Effect */
.btn:hover {
    transform: translateY(-4px) scale(1.05);
    filter: brightness(1.1);
}

/* Back Button */
.back {
    margin-top: 40px;
    display: inline-block;
    padding: 10px 20px;
    background: #5f27cd;
    color: white;
    text-decoration: none;
    border-radius: 30px;
}

.back:hover {
    background: #341f97;
}

</style>
</head>

<h1>🎓 Admissions 2026–27</h1>
