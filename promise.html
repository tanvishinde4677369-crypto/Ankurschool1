<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Promise - Ankur</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka&family=Outfit&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(to right, #fff7e6, #f3e8ff);
            margin: 0;
            text-align: center;
        }

        h1 {
            font-family: 'Fredoka';
            color: #5f27cd;
            margin: 30px 0;
            font-size: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: left;
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-8px);
        }

        .box h2 {
            font-family: 'Fredoka';
            margin-bottom: 15px;
        }

        .safety {
            border-left: 8px solid #ff9f43;
        }

        .growth {
            border-left: 8px solid #1dd1a1;
        }

        .item {
            margin-bottom: 12px;
            font-weight: 500;
            font-size: 1.05rem;
            color: #444;
        }

        .back {
            margin: 40px 0;
            display: inline-block;
            padding: 12px 25px;
            background: #5f27cd;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }

        .back:hover {
            background: #341f97;
        }
    </style>
</head>

<body>

    <h1>💖 Our Promise</h1>

    <div class="container">

        <!-- Safety -->
        <div class="box safety">
            <h2>🛡️ Safety & Care</h2>
            <div class="item">✔ Safe & hygienic environment</div>
            <div class="item">✔ Trained & caring staff</div>
            <div class="item">✔ CCTV monitoring</div>
            <div class="item">✔ Emotional & physical safety</div>
        </div>

        <!-- Growth -->
        <div class="box growth">
            <h2>🌱 Your Child Will</h2>
            <div class="item">✔ Learn joyfully</div>
            <div class="item">✔ Grow confidently</div>
            <div class="item">✔ Develop strong values</div>
            <div class="item">✔ Feel safe & loved</div>
        </div>

    </div>

    <a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
